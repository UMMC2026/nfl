name: Validate Outputs

on:
  push:
    branches: [ main, 'release/*' ]
  pull_request:
    branches: [ main ]

jobs:
  tests-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-base.txt ]; then pip install -r requirements-base.txt; fi

      - name: Run tests
        run: pytest -q || exit 1

      - name: Validate outputs if present
        run: |
          if [ -f outputs/signals_latest.json ]; then
            python scripts/validate_output.py --edges outputs/signals_latest.json || (echo "Validation failed" && exit 1)
          else
            echo "No outputs/signals_latest.json found — skipping validation step"
          fi
