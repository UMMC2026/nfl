# Tournament Mode Configuration — March Madness Controls

TOURNAMENT:
  start: "2025-03-01"
  end: "2025-04-10"

  # Hard restrictions
  allow_overs: false
  confidence_cap: 0.65
  max_edges_per_game: 1
  max_daily_edges: 3

  # Banned categories
  bans:
    - COMPOSITE_STATS
    - BENCH_PLAYERS
    - FIRST_GAME_FRESHMEN
    - LOW_SEED_OVERS

  # Variance inflation
  base_variance_mult: 1.25
  
  # Notes
  notes: |
    March games are structurally different:
    - Neutral courts
    - Short rest
    - Extreme whistle variance
    - Public overweights stars
    Capital defense mode, not excitement mode.
