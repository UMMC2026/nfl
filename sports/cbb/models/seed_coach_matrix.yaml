# Seed × Coach Interaction Matrix
# Multiplies VARIANCE based on seed position and coach tendencies

_notes: |
  Certain coaches systematically outperform or underperform expectations
  depending on seed position. This affects late-game pace, fouling behavior,
  and rotation trust.
  
  HIGH_SEED = team is favored (lower seed number)
  LOW_SEED = team is underdog (higher seed number)

DEFAULT: 1.00

